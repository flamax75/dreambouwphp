services:
  web:
    build: .
    container_name: dreambouw-php
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: dreambouw-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dreambouw
      MYSQL_USER: dreamuser
      MYSQL_PASSWORD: dreampass
    ports:
      - "3307:3306"
    volumes:
      - dreambouw_db_data:/var/lib/mysql

volumes:
  dreambouw_db_data: